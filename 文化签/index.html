<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title>新年文化签</title>
		<link rel="stylesheet" type="text/css" href="css/index.css"/>
	</head>
	<body>
		<div id="p1" class="page first-reset">
			<img src="img/bg1.png" class="img"/>
			<div class="p1-1">
				<div class="cards">
					<div class="line">
						<img src="img/p1-line.png"/>
					</div>
					<div class="card">
						<img src="img/1带字签.gif" width="30%"/>
					</div>
				</div>
				<div id="loading">
					loading 0%
				</div>
			</div>
		</div>
		<div id="p2" class="page reset">
			<div class="money pa">
				<div class="money1">
					<img src="img/q1.png"/>
				</div>
				<div class="money2">
					<img src="img/q2.png"/>
				</div>
			</div>
			<div class="words pa">
				<div class="w1">
					<img src="img/xin.png"/>
				</div>
				<div class="w2">
					<img src="img/nian.png"/>
				</div>
				<div class="w3">
					<img src="img/wen.png"/>
				</div>
				<div class="w4">
					<img src="img/hua.png"/>
				</div>
				<div class="w5">
					<img src="img/qian.png"/>
				</div>
			</div>
			<div class="p2-enter pa">
				抽一签
			</div>
			<img src="img/2背景.gif"/>
		</div>
		<div id="p3" class="page">
			<div class="pa">
				<img src="img/1.png"/>
				<img src="img/2.png"/>
				<img src="img/3.png"/>
				<img src="img/4.png"/>
				<img src="img/5.png"/>
				<img src="img/6.png"/>
				<img src="img/7.png"/>
				<img src="img/8.png"/>
				<img src="img/9.png"/>
				<img src="img/10.png"/>
			</div>
		</div>
		<div id="p4" class="page">
			<div class="input pa">
				<input type="text" name="" id="" placeholder="请输入" />
			</div>
			<div class="enter pa">
				<img src="img/bg2-raffle.png"/>
			</div>
		</div>
		<div id="p5" class="page">
			<div class="cards">
				<img class="card1" src="img/bg5_healthy.png"/>
				<img class="card2" src="img/bg5_love.png"/>
				<img class="card3" src="img/bg5_wealth.png"/>
				<img class="card4" src="img/bg5_studies.png"/>
			</div>
			<div class="circle line-center">
				<img src="img/b5_wheel.png" width="90%"/>
			</div>
		</div>
		<div id="p6" class="page">
			healthy
		</div>
		<div id="p7" class="page">
			love
		</div>
		<div id="p8" class="page">
			wealth
		</div>
		<div id="p9" class="page">
			studies
		</div>
		<div id="player">
			<img src="img/music.png"/>
			<audio class="player" autoplay loop src="media/周杰伦 - 兰亭序.mp3"></audio> 
		</div>
		<script src="js/index.js" type="text/javascript" charset="utf-8"></script>
	</body>
</html>
